<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aprendio Scorecard</title>
<link rel="icon" type="image/svg+xml" href="/static/logo.svg">
<link rel="stylesheet" href="/static/scorecard.css?v={{ static_v }}">
<script src="/static/htmx.min.js" defer></script>
</head>
<body class="tvboard" hx-get="/display/body?token={{ token }}" hx-trigger="every 60s" hx-select="#tvroot" hx-target="#tvroot" hx-swap="outerHTML">
<div class="board" id="tvroot">
  {% include "_display_body.html" %}
</div>
<div class="conn-lost" id="connlost" hidden>Not updating &middot; check network</div>
{% from "_icons.html" import icon %}
<a class="fab" href="/" title="Switch to edit mode">{{ icon('pencil') }}</a>
{% include "_about.html" %}
<script>
(function () {
  /* The TV must never show stale data silently or die on a rotated token. */
  var last = Date.now();
  document.body.addEventListener("htmx:afterSwap", function () {
    last = Date.now();
    document.getElementById("connlost").hidden = true;
  });
  document.body.addEventListener("htmx:responseError", function (e) {
    /* Token rotated: /tv re-resolves the current token server-side. */
    if (e.detail.xhr && e.detail.xhr.status === 403) window.location.href = "/tv";
  });
  setInterval(function () {
    if (Date.now() - last > 5 * 60 * 1000)
      document.getElementById("connlost").hidden = false;
  }, 30000);
  /* Periodic hard reload picks up deploys and fresh CSS unattended. */
  setTimeout(function () { window.location.reload(); }, 6 * 3600 * 1000);
})();
</script>
</body>
</html>
