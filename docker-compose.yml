services:
  scorecard:
    build: .
    container_name: aprendio-scorecard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8096:8000"
    volumes:
      - scorecard-data:/srv/scorecard/data
      # seed data (client names, staff emails) stays out of the image and repo:
      - ./migrate/seed_data.local.json:/srv/scorecard/migrate/seed_data.local.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/login', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  scorecard-data:
